[loggers]
keys=root,file_logger

[handlers]
keys=fileHandler,consoleHandler

[formatters]
keys=logFormatter,consoleFormatter

[logger_root]
level=INFO
handlers=fileHandler

[logger_file_logger]
level=DEBUG
handlers=fileHandler,consoleHandler
qualname=file_logger
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=consoleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=logFormatter
args=("./logs/vaccination_scheduler_" + time.strftime("%%Y%%m%%d") + ".log", "a")

[formatter_logFormatter]
format=%(asctime)s | %(levelname)-4s | %(funcName)s - %(lineno)04d | %(message)s

[formatter_consoleFormatter]
format=%(asctime)s | %(levelname)-4s | %(lineno)04d | %(message)s
