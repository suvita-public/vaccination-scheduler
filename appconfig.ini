[app]
# Path to the logging config file (relative to project root)
log_file_path = ./logconfig_calendarservice.ini
# Folder where generated schedule images are stored
upload_folder = ./vaccination-calendar
# Footer text shown on generated schedules - customise for your organisation
footer_text = Vaccination Scheduler
# Base URL used when output_mode=url - set this to your deployed domain
base_url = http://localhost:5000
