version: '3.8'

# Exposes the app on http://localhost:8080/vaccination/health
services:
  web:
    build: .
    ports:
      - "8080:5000"
    volumes:
      - ./vaccination-calendar:/app/vaccination-calendar
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/vaccination/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
